<!DOCTYPE html>
<html>
<head>
    <title>Register - SurakshaAI</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">
    <h1>📝 Register</h1>

    <input type="text" id="name" placeholder="Name">
    <input type="password" id="password" placeholder="Password">
    <input type="text" id="location" placeholder="Location">
    <input type="text" id="worker" placeholder="Worker Type">

    <button onclick="register()">Register</button>

    <p>Already have account? <a href="login.html">Login</a></p>

    <h3 id="message"></h3>
</div>

<script>
async function register() {
    const name = document.getElementById("name").value;
    const password = document.getElementById("password").value;
    const location = document.getElementById("location").value;
    const worker_type = document.getElementById("worker").value;

    const res = await fetch("http://127.0.0.1:5000/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({name, password, location, worker_type})
    });

    const data = await res.json();

    document.getElementById("message").innerText = data.message;

    if (data.message) {
        setTimeout(() => {
            window.location.href = "login.html";
        }, 1000);
    }
}
</script>

</body>
</html>
