<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Register - SurakshaAI</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">
    <h1>🚀 SurakshaAI</h1>
    <h3>Register</h3>

    <div class="form">
        <input type="text" id="name" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <input type="text" id="location" placeholder="Location">
        <input type="text" id="worker_type" placeholder="Worker Type">

        <button onclick="registerUser()">Register</button>
    </div>

    <p>Already user? <a href="login.html">Login here</a></p>
    <h3 id="status"></h3>
</div>

<script>
async function registerUser() {
    const name = document.getElementById("name").value;
    const password = document.getElementById("password").value;
    const location = document.getElementById("location").value;
    const worker_type = document.getElementById("worker_type").value;

    const response = await fetch("http://127.0.0.1:5000/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name, password, location, worker_type
        })
    });

    const data = await response.json();

    if (data.error) {
        document.getElementById("status").innerText = data.error;
    } else {
        document.getElementById("status").innerText = data.message;
        localStorage.setItem("user_id", data.user_id);

        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 1000);
    }
}
</script>

</body>
</html>
